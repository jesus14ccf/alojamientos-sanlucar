<div class="carrusel-hero" *ngIf="listaPropiedades.length > 0">
  <div class="slide" *ngFor="let casa of listaPropiedades; let i = index" [class.activo]="i === imagenActualIndex">

    <img [src]="'https://alojamientossanlucar.es/api/uploads/' + casa.imagen_principal" [alt]="casa.nombre">

    <div class="slide-overlay">
      <h2>{{ casa.nombre }}</h2>
    </div>
  </div>
</div>

<div class="buscador-flotante">
  <div class="buscador-inner">
    <div class="campo-busqueda">
      <label>Llegada</label>
      <input type="date" [(ngModel)]="fechaEntrada">
    </div>

    <div class="separador"></div>

    <div class="campo-busqueda">
      <label>Salida</label>
      <input type="date" [(ngModel)]="fechaSalida">
    </div>

    <button class="btn-buscar" (click)="buscarDisponibilidad()">
      <i class="fas fa-search"></i> Buscar
    </button>

  </div>
</div>

<div class="apartamentos-container">
  <h2 class="titulo-seccion">Nuestros Alojamientos en Sanlucar</h2>
  <div class="grid-apartamentos">
    <div class="card-alojamiento" *ngFor="let casa of listaPropiedades">
      <div class="imagen-container">
        <img [src]="'https://alojamientossanlucar.es/api/uploads/' + casa.imagen_principal" [alt]="casa.nombre">
      </div>

      <div class="info-card">
        <h3>{{ casa.nombre }}</h3>
        <p class="ubicacion"><i class="fas fa-map-marker-alt"></i> {{ casa.ubicacion }}</p>

        <div class="detalles-iconos">
          <span><i class="fas fa-users"></i> {{ casa.capacidad }} personas</span>
        </div>

        <p class="descripcion-corta">{{ casa.descripcion }}</p>

        <button class="btn-detalles" [routerLink]="['/apartamento', casa.id_propiedad]">
          VER DISPONIBILIDAD
        </button>
      </div>
    </div>
  </div>
</div>
